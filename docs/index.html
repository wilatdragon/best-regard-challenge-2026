<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Regard Challenge 2026</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a2f;
      --text: #e6ebff;
      --muted: #9fb0e0;
      --gold: #ffd700;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --green: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, #1b2550 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(800px, 100%);
      background: linear-gradient(180deg, #17213e, var(--card));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--gold);
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 10px 0 22px;
      color: var(--muted);
      font-size: 1rem;
    }
    .players {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .pill {
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 0.92rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .pill.arnav { color: var(--blue); }
    .pill.sibi { color: var(--purple); }
    .pill.nikhil { color: var(--green); }
    .cta {
      margin-top: 10px;
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(90deg, #f59e0b, var(--gold));
      color: #111;
      font-weight: 800;
      padding: 12px 18px;
      border-radius: 12px;
    }
    .note { margin-top: 14px; color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>🏆 Best Regard Challenge 2026</h1>
    <p class="sub">Live prediction challenge tracker for the 2026 season.</p>
    <div class="players">
      <span class="pill arnav">Arnav</span>
      <span class="pill sibi">Sibi</span>
      <span class="pill nikhil">Nikhil</span>
    </div>
    <p>The full interactive app is Streamlit-based and will be linked here once published.</p>
    <a class="cta" href="https://share.streamlit.io/" target="_blank" rel="noopener">Open Streamlit</a>
    <p class="note">GitHub Pages is live as the public landing page.</p>
  </main>
</body>
</html>
